<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="30%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#2d7a42"/>
      <stop offset="100%" stop-color="#0f3318"/>
    </radialGradient>
    <radialGradient id="ball" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#e8f500"/>
      <stop offset="100%" stop-color="#a8b800"/>
    </radialGradient>
    <filter id="shadow">
      <feDropShadow dx="3" dy="6" stdDeviation="8" flood-color="rgba(0,0,0,0.4)"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>

  <!-- Blage linije terena u pozadini -->
  <rect x="56" y="180" width="400" height="250" rx="4" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="3"/>
  <line x1="256" y1="180" x2="256" y2="430" stroke="rgba(255,255,255,0.06)" stroke-width="3"/>
  <line x1="56" y1="305" x2="456" y2="305" stroke="rgba(255,255,255,0.06)" stroke-width="3"/>

  <!-- REKET -->
  <g transform="translate(230, 268) rotate(-32)" filter="url(#shadow)">
    <ellipse cx="0" cy="-15" rx="118" ry="145" fill="none" stroke="#F4622A" stroke-width="22"/>
    <ellipse cx="0" cy="-15" rx="118" ry="145" fill="none" stroke="#ff8c5a" stroke-width="7"/>

    <!-- Horizontalne žice -->
    <line x1="-112" y1="-95" x2="112" y2="-95" stroke="rgba(255,255,255,0.5)" stroke-width="5"/>
    <line x1="-116" y1="-58" x2="116" y2="-58" stroke="rgba(255,255,255,0.5)" stroke-width="5"/>
    <line x1="-118" y1="-21" x2="118" y2="-21" stroke="rgba(255,255,255,0.5)" stroke-width="5"/>
    <line x1="-116" y1="16" x2="116" y2="16" stroke="rgba(255,255,255,0.5)" stroke-width="5"/>
    <line x1="-112" y1="53" x2="112" y2="53" stroke="rgba(255,255,255,0.5)" stroke-width="5"/>
    <line x1="-102" y1="90" x2="102" y2="90" stroke="rgba(255,255,255,0.5)" stroke-width="5"/>
    <line x1="-82" y1="118" x2="82" y2="118" stroke="rgba(255,255,255,0.4)" stroke-width="5"/>

    <!-- Vertikalne žice -->
    <line x1="-85" y1="-158" x2="-85" y2="124" stroke="rgba(255,255,255,0.5)" stroke-width="5"/>
    <line x1="-55" y1="-160" x2="-55" y2="133" stroke="rgba(255,255,255,0.5)" stroke-width="5"/>
    <line x1="-25" y1="-160" x2="-25" y2="136" stroke="rgba(255,255,255,0.5)" stroke-width="5"/>
    <line x1="5"  y1="-160" x2="5"  y2="136" stroke="rgba(255,255,255,0.5)" stroke-width="5"/>
    <line x1="35" y1="-160" x2="35" y2="133" stroke="rgba(255,255,255,0.5)" stroke-width="5"/>
    <line x1="65" y1="-158" x2="65" y2="124" stroke="rgba(255,255,255,0.5)" stroke-width="5"/>
    <line x1="95" y1="-152" x2="95" y2="108" stroke="rgba(255,255,255,0.45)" stroke-width="5"/>

    <!-- Grlo -->
    <path d="M-34,128 C-34,128 -22,162 -16,172 L16,172 C22,162 34,128 34,128 Z" fill="#F4622A"/>

    <!-- Drška -->
    <rect x="-19" y="170" width="38" height="118" rx="14" fill="#F4622A"/>
    <rect x="-10" y="174" width="14" height="108" rx="7" fill="#ff7f4f" opacity="0.45"/>
    <rect x="-21" y="274" width="42" height="16" rx="8" fill="#cc4a18"/>
  </g>

  <!-- LOPTICA -->
  <circle cx="355" cy="138" r="56" fill="url(#ball)" filter="url(#shadow)"/>
  <circle cx="341" cy="124" r="17" fill="rgba(255,255,255,0.28)"/>
  <path d="M316,106 Q355,138 316,170" fill="none" stroke="white" stroke-width="5.5" opacity="0.55"/>
  <path d="M394,106 Q355,138 394,170" fill="none" stroke="white" stroke-width="5.5" opacity="0.55"/>
</svg>
